# J.A.R.V.I.S. — Windows Docker Compose
# ─────────────────────────────────────────
# 1. Copy .env.example → .env and fill in your keys
# 2. Copy config.template.yaml → config.yaml and fill in your keys
# 3. docker compose up -d
# 4. Open http://localhost:3142

services:
  jarvis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis
    restart: unless-stopped
    ports:
      - "3142:3142"
    volumes:
      # Persistent data (DB, vault, projects)
      - jarvis-data:/data
      # Mount your config file so keys survive container rebuilds
      - ./config.yaml:/data/config.yaml:ro
    environment:
      # ── LLM ──────────────────────────────────────────────────
      # Primary: Anthropic Claude (recommended)
      - JARVIS_API_KEY=${ANTHROPIC_API_KEY}

      # ── GitHub — website generator repo push ─────────────────
      - JARVIS_GITHUB_TOKEN=${GITHUB_TOKEN}

      # ── Optional auth token (protects the dashboard) ─────────
      # - JARVIS_AUTH_TOKEN=${JARVIS_AUTH_TOKEN}

      # ── Runtime ──────────────────────────────────────────────
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3142/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  jarvis-data:
    driver: local
